<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)" />
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Play triangle -->
  <polygon points="78,58 78,142 148,100" fill="url(#play)" filter="url(#glow)"/>
  <!-- Small signal dots -->
  <circle cx="155" cy="55" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="168" cy="68" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="175" cy="85" r="2" fill="rgba(255,255,255,0.25)"/>
</svg>
