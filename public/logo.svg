<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#g2)" stroke-width="3" opacity=".6"/>
  <!-- Inner fill -->
  <circle cx="100" cy="100" r="78" fill="url(#g1)" opacity=".12"/>
  <!-- Play triangle -->
  <polygon points="75,55 75,145 150,100" fill="url(#g1)" filter="url(#glow)"/>
  <!-- Signal arcs -->
  <path d="M158 52 Q172 68 158 84" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>
  <path d="M168 42 Q188 68 168 94" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <path d="M178 34 Q202 68 178 102" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
</svg>
